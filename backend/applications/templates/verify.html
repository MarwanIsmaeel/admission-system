<!DOCTYPE html>
<html>
<head>
    <title>Voucher Verification</title>
</head>
<body>

<h2>Enter your Voucher Code</h2>

<form method="POST">
    {% csrf_token %}
    
    <input type="text" name="code" placeholder="Enter code" required>
    <button type="submit">Verify</button>
</form>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

</body>
</html>
